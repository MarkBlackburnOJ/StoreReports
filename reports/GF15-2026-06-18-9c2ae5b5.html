<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16539F">
<title>Stock Action Report</title>
<style>
  :root{
    --blue:#16539F; --blue-deep:#0E3D75;
    --red:#E31E24; --red-text:#A32D2D; --red-tint:#FCEBEB;
    --phantom:#9E1B1F; --phantom-text:#7E1417; --phantom-tint:#F7E3E3;
    --amber:#854F0B; --amber-text:#633806; --amber-tint:#FAEEDA;
    --ink:#1F2024; --mute:#6B7480; --mute-2:#8A929D;
    --paper:#F4F6F8; --card:#FFFFFF; --line:#E3E7EC; --line-soft:#ECEEF1;
    --shell:#E7EAEE;
  }
  *{box-sizing:border-box;-webkit-text-size-adjust:100%;}
  html,body{margin:0;padding:0;}
  body{background:var(--shell);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:14px;line-height:1.4;}
  .app{max-width:480px;margin:0 auto;background:var(--paper);min-height:100vh;
    box-shadow:0 0 24px rgba(0,0,0,.06);}
  header{background:var(--blue);color:#fff;padding:18px 18px 16px;}
  header .eyebrow{font-size:11px;letter-spacing:.08em;color:rgba(255,255,255,.72);text-transform:uppercase;}
  header .name{font-size:22px;font-weight:700;margin-top:4px;letter-spacing:-.01em;}
  header .meta{font-size:12px;color:rgba(255,255,255,.8);margin-top:3px;}
  .kpis{display:flex;gap:8px;padding:14px 14px 8px;}
  .kpi{flex:1;border-radius:12px;padding:11px 6px;text-align:center;}
  .kpi .v{font-size:23px;font-weight:700;line-height:1;}
  .kpi .l{font-size:11px;margin-top:4px;}
  .kpi.oos{background:var(--red-tint);}      .kpi.oos .v{color:#C2161B;}     .kpi.oos .l{color:var(--red-text);}
  .kpi.phantom{background:var(--phantom-tint);} .kpi.phantom .v{color:var(--phantom);} .kpi.phantom .l{color:var(--phantom-text);}
  .kpi.low{background:var(--amber-tint);}     .kpi.low .v{color:var(--amber);}    .kpi.low .l{color:var(--amber-text);}
  .sticky{position:sticky;top:0;z-index:10;background:var(--paper);padding-bottom:2px;}
  .tabs{display:flex;background:#E0E4E9;border-radius:11px;padding:3px;margin:6px 14px 0;}
  .tab{flex:1;text-align:center;padding:8px 0;font-size:11.5px;color:#5F5E5A;border-radius:9px;cursor:pointer;border:0;background:none;font-family:inherit;}
  .tab.active{background:var(--blue);color:#fff;font-weight:600;}
  .toolbar{padding:10px 14px 8px;display:flex;gap:8px;align-items:center;}
  .search{flex:1;display:flex;align-items:center;gap:6px;background:var(--card);
    border:.5px solid #DFE3E8;border-radius:10px;padding:0 10px;height:38px;}
  .search input{border:0;outline:0;flex:1;font-size:13px;font-family:inherit;color:var(--ink);background:none;min-width:0;}
  .search svg{flex-shrink:0;}
  .sortbtn{display:flex;align-items:center;gap:5px;background:var(--card);border:.5px solid #DFE3E8;
    border-radius:10px;height:38px;padding:0 11px;font-size:12px;color:#3F4651;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .listhead{display:flex;justify-content:space-between;padding:8px 16px 6px;background:var(--card);}
  .listhead span{font-size:11px;color:var(--mute-2);}
  .list{background:var(--card);}
  .row{border-top:.5px solid var(--line-soft);}
  .row .top{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;}
  .row .desc{flex:1;min-width:0;}
  .row .desc .d1{font-size:13.5px;font-weight:600;line-height:1.25;}
  .row .desc .d2{font-size:11px;color:var(--mute-2);margin-top:2px;}
  .row .metric{text-align:right;white-space:nowrap;}
  .row .metric .mv{font-size:15px;font-weight:700;}
  .row .metric .mu{font-size:11px;color:var(--mute-2);}
  .row .chev{flex-shrink:0;transition:transform .18s;color:#B4B2A9;}
  .row.open{background:#F7FAFF;}
  .row.open .chev{transform:rotate(180deg);color:var(--blue);}
  .detail{display:none;padding:0 14px 14px;}
  .row.open .detail{display:block;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px 8px;
    background:var(--card);border:.5px solid var(--line);border-radius:10px;padding:13px;}
  .grid .lbl{font-size:11px;color:var(--mute-2);}
  .grid .val{font-size:14px;font-weight:600;margin-top:1px;}
  .hint{margin-top:10px;display:inline-flex;align-items:center;gap:6px;font-size:11.5px;
    padding:6px 11px;border-radius:999px;}
  .empty{padding:40px 20px;text-align:center;color:var(--mute);font-size:13.5px;background:var(--card);}
  .empty .big{font-size:15px;color:var(--ink);font-weight:600;margin-bottom:4px;}
  footer{padding:14px;text-align:center;font-size:11px;color:var(--mute-2);}
</style>
</head>

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtDate(iso){
    if(!iso || String(iso).indexOf('1900')===0) return '—';
    var p = String(iso).split('-');
    if(p.length!==3) return iso;
    return (+p[2]) + ' ' + (MO[(+p[1])-1]||'') + " '" + p[0].slice(2);
  }
  function ago(d){ return (d==null) ? '' : ' · ' + d + 'd'; }

  var GROUPS = [
    { key:'oos', label:'Out of stock', data:kpis.oos||[],
      color:'#E31E24', tint:'var(--red-tint)', tcol:'var(--red-text)',
      metric:function(r){return (r.dros||0).toFixed(2);}, unit:'/day', head:'Lost / day',
      cmp:function(a,b){return (b.dros||0)-(a.dros||0);},
      hint:'Shelf empty — still selling' },
    { key:'phantom', label:'Phantom', data:kpis.phantom||[],
      color:'#9E1B1F', tint:'var(--phantom-tint)', tcol:'var(--phantom-text)',
      metric:function(r){return String(Math.round(r.soh||0));}, unit:'units', head:'On hand',
      cmp:function(a,b){return (b.soh||0)-(a.soh||0);},
      hint:'Has stock, no recent sales — verify count' },
    { key:'low_cover', label:'Low cover', data:kpis.low_cover||[],
      color:'#854F0B', tint:'var(--amber-tint)', tcol:'var(--amber-text)',
      metric:function(r){return (r.dsc||0).toFixed(1);}, unit:'d cover', head:'Days cover',
      cmp:function(a,b){return (a.dsc||0)-(b.dsc||0);},
      hint:'Will run out soon — reorder' }
  ];
  var byKey = {}; GROUPS.forEach(function(g){ byKey[g.key]=g; });

  var state = { tab:'oos', q:'', sort:'urgent', open:-1 };

  // Header + KPIs
  document.getElementById('storeName').textContent = meta.store_name || meta.store_code || 'Store report';
  document.getElementById('storeMeta').textContent =
    [meta.store_code, meta.profile, meta.week_ending_pretty ? ('Week ending '+meta.week_ending_pretty) : '']
      .filter(Boolean).join(' · ');
  document.getElementById('kpis').innerHTML =
    '<div class="kpi oos"><div class="v">'+(sum.oos_count||0)+'</div><div class="l">Out of stock</div></div>'+
    '<div class="kpi phantom"><div class="v">'+(sum.phantom_count||0)+'</div><div class="l">Phantom</div></div>'+
    '<div class="kpi low"><div class="v">'+(sum.low_cover_count||0)+'</div><div class="l">Low cover</div></div>';
  document.getElementById('footer').textContent =
    [ (sum.active_count||0)+' active', (sum.total_articles||0)+' total',
      meta.generated ? ('generated '+meta.generated) : '' ].filter(Boolean).join(' · ');

  // Tabs
  document.getElementById('tabs').innerHTML = GROUPS.map(function(g){
    return '<button class="tab" data-tab="'+g.key+'">'+esc(g.label)+'</button>';
  }).join('');

  function currentRows(){
    var g = byKey[state.tab];
    var rows = g.data.slice();
    if(state.q){
      var q = state.q.toLowerCase();
      rows = rows.filter(function(r){
        return (r.desc||'').toLowerCase().indexOf(q)>=0 ||
               (r.barcode||'').toLowerCase().indexOf(q)>=0 ||
               String(r.id||'').toLowerCase().indexOf(q)>=0;
      });
    }
    rows.sort(state.sort==='az'
      ? function(a,b){ return (a.desc||'').toLowerCase()<(b.desc||'').toLowerCase()?-1:1; }
      : g.cmp);
    return rows;
  }

  function detailHTML(r, g){
    var status = (r.status||'') + (sdefs[r.status] ? ' '+sdefs[r.status] : '');
    return '<div class="detail"><div class="grid">'+
      cell('SOH', Math.round(r.soh||0)) +
      cell('DROS', (r.dros||0).toFixed(2)) +
      cell('Days cover', (r.dsc||0).toFixed(1)) +
      cell('Last sold', fmtDate(r.last_sold)+ago(r.days_sold)) +
      cell('Barcode', esc(r.barcode||'—')) +
      cell('Status', esc(status||'—')) +
      '</div><div class="hint" style="background:'+g.tint+';color:'+g.tcol+'">'+esc(g.hint)+'</div></div>';
  }
  function cell(l,v){ return '<div><div class="lbl">'+l+'</div><div class="val">'+v+'</div></div>'; }

  function render(){
    GROUPS.forEach(function(g){
      var t = document.querySelector('.tab[data-tab="'+g.key+'"]');
      if(t) t.className = 'tab' + (g.key===state.tab?' active':'');
    });
    var g = byKey[state.tab];
    var rows = currentRows();
    document.getElementById('metricLabel').textContent = g.head;
    document.getElementById('countLabel').textContent =
      state.q ? (rows.length+' match'+(rows.length===1?'':'es'))
              : (rows.length+' to action');

    var list = document.getElementById('list');
    if(!rows.length){
      list.innerHTML = '<div class="empty"><div class="big">All clear</div>'+
        (state.q ? 'No items match your search.' : 'Nothing to action in this list.')+'</div>';
      return;
    }
    list.innerHTML = rows.map(function(r,i){
      var open = (i===state.open);
      return '<div class="row'+(open?' open':'')+'" data-i="'+i+'">'+
        '<div class="top">'+
          '<div class="desc"><div class="d1">'+esc(r.desc||'(no description)')+'</div>'+
            '<div class="d2">'+esc((r.vendor||'')+(r.id?(' · #'+r.id):''))+'</div></div>'+
          '<div class="metric"><span class="mv" style="color:'+g.color+'">'+g.metric(r)+'</span> '+
            '<span class="mu">'+g.unit+'</span></div>'+
          '<svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"></path></svg>'+
        '</div>'+ (open ? detailHTML(r,g) : '') +
      '</div>';
    }).join('');
  }

  document.getElementById('tabs').addEventListener('click', function(e){
    var t = e.target.closest('.tab'); if(!t) return;
    state.tab = t.getAttribute('data-tab'); state.open=-1; render();
  });
  document.getElementById('list').addEventListener('click', function(e){
    var row = e.target.closest('.row'); if(!row) return;
    var i = +row.getAttribute('data-i');
    state.open = (state.open===i ? -1 : i);
    render();
  });
  document.getElementById('search').addEventListener('input', function(e){
    state.q = e.target.value.trim(); state.open=-1; render();
  });
  document.getElementById('sortBtn').addEventListener('click', function(){
    state.sort = (state.sort==='urgent' ? 'az' : 'urgent');
    document.getElementById('sortLabel').textContent = (state.sort==='az' ? 'A–Z' : 'Most urgent');
    state.open=-1; render();
  });

  render();
})();
</script>
</body>
</html>
