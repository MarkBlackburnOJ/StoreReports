<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16539F">
<title>Stock Action Report</title>
<style>
  :root{
    --blue:#16539F; --blue-deep:#0E3D75; --blue-tint:#E4ECF7;
    --red:#E31E24; --red-deep:#C2161B; --red-text:#A32D2D; --red-tint:#FCEBEB;
    --green:#1E8E3E; --green-deep:#157233; --green-text:#1B6E33; --green-tint:#E6F4EA;
    --ink:#1F2024; --mute:#6B7480; --mute-2:#8A929D;
    --paper:#F4F6F8; --card:#FFFFFF; --line:#E3E7EC; --line-soft:#ECEEF1; --shell:#E7EAEE;
  }
  *{box-sizing:border-box;-webkit-text-size-adjust:100%;}
  html,body{margin:0;padding:0;}
  body{background:var(--shell);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:14px;line-height:1.4;}
  .app{max-width:480px;margin:0 auto;background:var(--paper);min-height:100vh;
    box-shadow:0 0 24px rgba(0,0,0,.06);}

  /* Header */
  header{background:var(--blue);color:#fff;padding:18px 18px 16px;}
  .hrow{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  header .eyebrow{font-size:11px;letter-spacing:.08em;color:rgba(255,255,255,.72);text-transform:uppercase;}
  header .name{font-size:22px;font-weight:700;margin-top:4px;letter-spacing:-.01em;}
  header .meta{font-size:12px;color:rgba(255,255,255,.8);margin-top:3px;}
  .ibtn{border:0;background:rgba(255,255,255,.16);color:#fff;width:36px;height:36px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
  .ibtn:active{background:rgba(255,255,255,.28);}

  /* Client filter */
  .filterbar{padding:12px 14px 2px;}
  .field{display:flex;align-items:center;gap:10px;background:var(--card);border:.5px solid #DFE3E8;
    border-radius:10px;padding:0 12px;height:42px;}
  .field .flabel{font-size:10.5px;color:var(--mute-2);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
  .field select{flex:1;border:0;outline:0;background:none;font-size:13.5px;font-family:inherit;color:var(--ink);height:100%;min-width:0;}

  /* KPI cards (double as tabs) */
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 14px 6px;}
  .card{position:relative;border-radius:12px;padding:11px 6px 10px;text-align:center;cursor:pointer;
    border:1.5px solid transparent;background:var(--card);min-height:62px;font-family:inherit;
    display:flex;flex-direction:column;justify-content:center;}
  .card .v{font-size:22px;font-weight:700;line-height:1;}
  .card .l{font-size:10.5px;margin-top:5px;line-height:1.15;}
  .card.red{background:var(--red-tint);} .card.red .v{color:var(--red-deep);} .card.red .l{color:var(--red-text);}
  .card.green{background:var(--green-tint);} .card.green .v{color:var(--green);} .card.green .l{color:var(--green-text);}
  .card.neutral{background:var(--blue-tint);} .card.neutral .v{color:var(--blue);} .card.neutral .l{color:var(--blue-deep);}
  .card.sel{border-color:var(--blue);box-shadow:0 0 0 2px rgba(22,83,159,.18);}
  .card .tick{position:absolute;top:6px;right:8px;font-size:11px;font-weight:700;color:var(--green);}

  /* Sticky toolbar */
  .sticky{position:sticky;top:0;z-index:10;background:var(--paper);padding-bottom:2px;}
  .toolbar{padding:8px 14px 8px;display:flex;gap:8px;align-items:center;}
  .search{flex:1;display:flex;align-items:center;gap:6px;background:var(--card);
    border:.5px solid #DFE3E8;border-radius:10px;padding:0 10px;height:38px;}
  .search input{border:0;outline:0;flex:1;font-size:13px;font-family:inherit;color:var(--ink);background:none;min-width:0;}
  .search svg{flex-shrink:0;}
  .sortbtn{display:flex;align-items:center;gap:5px;background:var(--card);border:.5px solid #DFE3E8;
    border-radius:10px;height:38px;padding:0 11px;font-size:12px;color:#3F4651;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .listhead{display:flex;justify-content:space-between;padding:8px 16px 6px;background:var(--card);}
  .listhead span{font-size:11px;color:var(--mute-2);}

  /* List + rows */
  .list{background:var(--card);}
  .row{border-top:.5px solid var(--line-soft);transition:background .25s ease;}
  .row.ticking{background:var(--green-tint);}
  .row.ticking .d1{text-decoration:line-through;color:var(--mute);}
  .row.collapsing{opacity:0;overflow:hidden;transform:translateX(12px);transition:max-height .3s ease,opacity .3s ease,transform .3s ease;}
  /* Reduced motion: keep the green flash + fade/collapse, drop the bouncy pop and the slide. */
  @media (prefers-reduced-motion:reduce){.chk::after{transition:none;} .row.collapsing{transform:none;}}
  .row .top{display:flex;align-items:center;gap:11px;padding:11px 14px;}
  .chk{appearance:none;-webkit-appearance:none;width:23px;height:23px;border:2px solid #C2C8D0;border-radius:6px;
    flex-shrink:0;cursor:pointer;position:relative;background:var(--card);margin:0;transition:background .16s ease,border-color .16s ease;}
  .chk:checked{background:var(--green);border-color:var(--green);}
  .chk::after{content:'';position:absolute;left:7px;top:3px;width:5px;height:10px;
    border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg) scale(0);
    transition:transform .22s cubic-bezier(.34,1.7,.5,1);}
  .chk:checked::after{transform:rotate(45deg) scale(1);}
  .tap{flex:1;min-width:0;display:flex;align-items:center;gap:10px;cursor:pointer;}
  .desc{flex:1;min-width:0;}
  .desc .d1{font-size:13.5px;font-weight:600;line-height:1.25;}
  .desc .d2{font-size:11px;color:var(--mute-2);margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .desc .d2 .bc{display:inline-flex;align-items:center;gap:3px;}
  .desc .d2 .bc svg{color:var(--mute);}
  .desc .d2 .vend{font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.02em;}
  .row.done .d1{text-decoration:line-through;color:var(--mute);}
  .row.done{background:#FAFBFC;}
  .metric{text-align:right;white-space:nowrap;}
  .metric .mv{font-size:15px;font-weight:700;}
  .metric .mu{font-size:11px;color:var(--mute-2);}
  .chev{flex-shrink:0;transition:transform .18s;color:#B4B2A9;}
  .row.open{background:#F7FAFF;}
  .row.open .chev{transform:rotate(180deg);color:var(--blue);}

  /* Expanded detail */
  .detail{display:block;padding:0 14px 14px 48px;}
  .cta{display:flex;align-items:center;gap:8px;margin:0 0 11px;padding:9px 12px;border-radius:9px;
    background:var(--red-tint);color:var(--red-text);font-size:12.5px;font-weight:700;}
  .cta svg{flex-shrink:0;color:var(--red);}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px 8px;
    background:var(--card);border:.5px solid var(--line);border-radius:10px;padding:13px;}
  .grid .lbl{font-size:10.5px;color:var(--mute-2);}
  .grid .val{font-size:13.5px;font-weight:600;margin-top:1px;word-break:break-word;}

  /* Category badge (All products view) */
  .badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;
    text-transform:uppercase;letter-spacing:.02em;}
  .badge.red{background:var(--red-tint);color:var(--red-text);}
  .badge.grey{background:#EEF0F3;color:var(--mute);}
  .badge.new{background:var(--blue-tint);color:var(--blue-deep);}

  /* Completed section */
  .compsec{border-top:8px solid var(--shell);}
  .comphead{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;
    background:var(--card);font-size:12px;color:var(--mute);font-weight:600;}
  .comphead .lk{color:var(--blue);}

  .empty{padding:38px 20px;text-align:center;color:var(--mute);font-size:13.5px;background:var(--card);}
  .empty .big{font-size:15px;color:var(--ink);font-weight:600;margin-bottom:4px;}
  footer{padding:16px 14px 26px;text-align:center;font-size:11px;color:var(--mute-2);}

  /* Glossary overlay */
  .overlay{position:fixed;inset:0;background:rgba(20,25,33,.45);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
  .overlay[hidden]{display:none;}
  .sheet{background:var(--paper);width:100%;max-width:480px;max-height:88vh;border-radius:16px 16px 0 0;
    display:flex;flex-direction:column;}
  .sheethead{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:.5px solid var(--line);}
  .shtitle{font-size:15px;font-weight:700;}
  .iclose{border:0;background:#EEF0F3;width:30px;height:30px;border-radius:50%;font-size:15px;color:var(--mute);cursor:pointer;}
  .sheetbody{overflow:auto;padding:4px 18px 26px;}
  .gnote{font-size:12.5px;color:var(--ink);line-height:1.55;background:var(--blue-tint);
    border-radius:10px;padding:12px 13px;margin:14px 0 6px;}
  .gitem{padding:13px 2px;border-bottom:.5px solid var(--line-soft);}
  .gitem .gt{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .gitem .gd{font-size:12.5px;color:var(--mute);margin-top:5px;line-height:1.55;}
  .gdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
</style>
</head>

rp":"ND","supply":"Stock Transfer","soh":17.0,"dros":0.231,"dsc":73.6,"last_recv":"2026-01-31","last_sold":"2026-06-28","last_ord":"2026-01-29","days_recv":151,"days_sold":3,"days_ord":153,"barcode":"6004049013179","tags":["discontinued_stock"]},{"id":"921717","desc":"TTI COLORIT DINNER PLATE 10.5INCH","vendor":"TRAMARCO TRADING","status":"72","listing":"X","rp":"ND","supply":"Stock Transfer","soh":0.0,"dros":0.011,"dsc":0.0,"last_recv":"2025-03-29","last_sold":"2026-04-26","last_ord":"2025-03-25","days_recv":459,"days_sold":66,"days_ord":463,"barcode":"6004049045057","tags":["inactive"]},{"id":"989316","desc":"TTI GLASS TUMBLER 140ML","vendor":"TRAMARCO TRADING","status":"60","listing":"L","rp":"ND","supply":"Stock Transfer","soh":41.0,"dros":0.176,"dsc":233.0,"last_recv":"2025-05-10","last_sold":"2026-06-29","last_ord":"2025-05-06","days_recv":417,"days_sold":2,"days_ord":421,"barcode":"6004049048751","tags":["discontinued_stock"]},{"id":"570500","desc":"TTI MUG GLAZED 11OZ","vendor":"TRAMARCO TRADING","status":"05","listing":"L","rp":"ND","supply":"Standard","soh":11.0,"dros":0.0,"dsc":0.0,"last_recv":"2024-11-07","last_sold":"2025-12-12","last_ord":"2024-10-07","days_recv":601,"days_sold":201,"days_ord":632,"barcode":"6004049023567","tags":["inactive"]},{"id":"673423","desc":"TTI TUMBLER CLEAR WHISKEY","vendor":"TRAMARCO TRADING","status":"72","listing":"X","rp":"ND","supply":"Stock Transfer","soh":0.0,"dros":0.681,"dsc":0.0,"last_recv":"2024-11-07","last_sold":"2026-05-22","last_ord":"2024-11-07","days_recv":601,"days_sold":40,"days_ord":601,"barcode":"6004049003415","tags":["inactive"]},{"id":"866764","desc":"TTI WHITE BOWL 5.5IN","vendor":"TRAMARCO TRADING","status":"72","listing":"","rp":"ND","supply":"Stock Transfer","soh":0.0,"dros":0.011,"dsc":0.0,"last_recv":"2024-12-14","last_sold":"2026-04-15","last_ord":"2024-12-12","days_recv":564,"days_sold":77,"days_ord":566,"barcode":"6004049013308","tags":["inactive"]},{"id":"738536","desc":"TTI WHITE DINNER PLATE 10.5 INCH","vendor":"TRAMARCO TRADING","status":"72","listing":"X","rp":"ND","supply":"Stock Transfer","soh":0.0,"dros":0.143,"dsc":0.0,"last_recv":"2024-11-23","last_sold":"2026-05-19","last_ord":"2024-11-20","days_recv":585,"days_sold":43,"days_ord":588,"barcode":"6004049038851","tags":["inactive"]},{"id":"777873","desc":"TTI WHITE SIDE PLATE 7.5 INCH","vendor":"TRAMARCO TRADING","status":"72","listing":"X","rp":"ND","supply":"Stock Transfer","soh":0.0,"dros":0.165,"dsc":0.0,"last_recv":"2025-07-19","last_sold":"2026-05-26","last_ord":"2025-07-17","days_recv":347,"days_sold":36,"days_ord":349,"barcode":"6004049029002","tags":["inactive"]}],"all_vendors":["AFRICA GROUP LUBRICANTS","BOARDMAN BROS","BRC","CLIPPA SALES","LK PRODUCTS","MPO VAPES","OTIMA","SCHOU","TRAMARCO TRADING"],"status_defs":{"02":"Mandatory listing","04":"Active","05":"Allocations only","06":"Temp discontinued","07":"Permanently discontinued","08":"To be deleted","09":"Deleted","60":"Seasonal — temp discontinued","61":"Franchise temp discontinued","62":"Interrupted supply","70":"Franchise temp discontinued","71":"Franchise perm discontinued","72":"Discontinued","73":"Art in cluster, not store","7A":"DC exit code A","7B":"DC exit code B","7C":"DC exit code C","7D":"DC exit code D","7E":"DC exit code E","01":"Pending creation","03":"Local listing","10":"Special order","11":"Direct delivery","50":"Held","51":"Suspended","99":"Unknown"},"status_tier":{"04":"active","05":"active","02":"active","03":"active","06":"temp","60":"temp","61":"temp","62":"temp","70":"temp","07":"discontinued","71":"discontinued","72":"discontinued","7A":"exit","7B":"exit","7C":"exit","7D":"exit","7E":"exit","08":"deleted","09":"deleted","01":"pending","10":"pending","11":"pending","50":"other","51":"other","73":"other","99":"other"}}</script>
<script>
(function(){
  var D;
  try { D = JSON.parse(document.getElementById('payload').textContent); }
  catch(e){ document.getElementById('list').innerHTML = '<div class="empty">Could not load report data.</div>'; return; }

  var meta = D.meta || {}, ALL = D.all_products || [], sdefs = D.status_defs || {};
  var MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var DISC = {'72':1,'07':1,'71':1,'70':1,'06':1,'60':1,'61':1,'08':1};

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function num(x){ var n = (typeof x==='number')?x:parseFloat(x); return isFinite(n)?n:0; }
  function fmtDate(iso){
    if(!iso || String(iso).indexOf('1900')===0) return '—';
    var p = String(iso).split('-'); if(p.length!==3) return iso;
    return (+p[2]) + ' ' + (MO[(+p[1])-1]||'') + " '" + p[0].slice(2);
  }
  function ago(d){ return (d==null) ? '' : ' · '+d+'d'; }
  function isPhantomStale(r){
    var ls = r.last_sold || '';
    if(!ls || String(ls).indexOf('1900')===0) return false;
    return (r.days_sold!=null) && (r.days_sold>=60);
  }

  // ---- Classification: multi-membership ----
  // An article can match several rules; it appears in every matching list, with chips showing the
  // others. Completion is keyed by article id, so ticking it off in one list ticks it off everywhere.
  // cats() returns matches in priority order; cats()[0] is the "primary" (Negative beats Out of stock).
  function cats(r){
    var st = String(r.status||''), soh = num(r.soh), dsc = num(r.dsc), dros = num(r.dros), active = (st==='04');
    var out = [];
    if (soh < 0) out.push('negative');                                     // any status — count to fix
    if (active && soh <= 0) out.push('oos');                               // shelf empty (incl. negatives)
    if (active && soh > 0 && isPhantomStale(r)) out.push('phantom');       // stock but no recent sale
    if (active && soh >= 0 && dsc <= 14 && dros > 0) out.push('low_cover'); // low but still selling (may also be out of stock)
    if (!active && soh > 0 && DISC[st]) out.push('discontinued');          // inactive but holding stock
    return out;                                                            // priority order (negative first)
  }
  function classify(r){ var c = cats(r); return c.length ? c[0] : null; }  // primary tag, or null

  // ---- Category display config (in YOUR requested display order) ----
  var CATS = [
    { key:'oos', label:'Out of stock', cta:'Out of stock — order needed',
      metric:function(r){return num(r.dros).toFixed(2);}, unit:'/day', head:'Lost / day',
      cmp:function(a,b){return num(b.dros)-num(a.dros);} },
    { key:'low_cover', label:'Low Stock Cover', cta:'Stock running low — order needed',
      metric:function(r){return num(r.dsc).toFixed(1);}, unit:'days', head:'Days cover',
      cmp:function(a,b){return num(a.dsc)-num(b.dsc);} },
    { key:'phantom', label:'Phantom', cta:'Missing stock — verify count',
      metric:function(r){return String(Math.round(num(r.soh)));}, unit:'on hand', head:'On hand',
      cmp:function(a,b){return num(b.soh)-num(a.soh);} },
    { key:'negative', label:'Negative SOH', cta:'Negative on-hand — count needed',
      metric:function(r){return String(Math.round(num(r.soh)));}, unit:'on hand', head:'On hand',
      cmp:function(a,b){return num(a.soh)-num(b.soh);} },
    { key:'discontinued', label:'Discontinued with SOH', cta:'',
      metric:function(r){return String(Math.round(num(r.soh)));}, unit:'on hand', head:'On hand',
      cmp:function(a,b){return num(b.soh)-num(a.soh);} }
  ];
  var CAT = {}; CATS.forEach(function(c){ CAT[c.key]=c; });
  var PRIORITY = ['negative','oos','phantom','low_cover','discontinued'];

  var ALLCFG = { key:'all', head:'On hand',
    metric:function(r){return String(Math.round(num(r.soh)));}, unit:'on hand',
    cmp:function(a,b){
      var pa=PRIORITY.indexOf(classify(a)), pb=PRIORITY.indexOf(classify(b));
      pa=pa<0?99:pa; pb=pb<0?99:pb;
      if(pa!==pb) return pa-pb; return num(b.soh)-num(a.soh);
    } };

  // ---- Completion state (persisted per store+week; degrades to in-memory) ----
  var STKEY = 'aria-v2-done::' + (meta.store_code||'') + '::' + (meta.week_ending||'');
  var done = (function(){
    try{ var raw = window.localStorage.getItem(STKEY); if(raw){ var a=JSON.parse(raw); if(a&&a.length) return new Set(a); } }catch(e){}
    return new Set();
  })();
  function persist(){ try{ window.localStorage.setItem(STKEY, JSON.stringify(Array.from(done))); }catch(e){} }
  function keyOf(r){ return String(r.id || (String(r.desc||'')+'|'+String(r.barcode||''))); }

  var state = { view:'oos', q:'', sort:'urgent', client:'', open:null, compOpen:{} };

  // ---- Client list ----
  var CLIENTS = (function(){ var s={}; ALL.forEach(function(r){ if(r.vendor) s[r.vendor]=1; }); return Object.keys(s).sort(); })();

  // ---- Buckets for the current client ----
  var buckets={}, viewAll=[];
  function rebuild(){
    var pool = state.client ? ALL.filter(function(r){return r.vendor===state.client;}) : ALL;
    buckets = {oos:[],low_cover:[],phantom:[],negative:[],discontinued:[]};
    pool.forEach(function(r){ cats(r).forEach(function(k){ buckets[k].push(r); }); });
    viewAll = pool.slice();
  }
  function outstanding(key){ var a=buckets[key]||[], n=0; for(var i=0;i<a.length;i++){ if(!done.has(keyOf(a[i]))) n++; } return n; }
  function activeCount(){ var n=0; for(var i=0;i<ALL.length;i++){ if(String(ALL[i].status)==='04') n++; } return n; }

  // ---- One-time header + filter ----
  document.getElementById('storeName').textContent = meta.store_name || meta.store_code || 'Store report';
  document.getElementById('storeMeta').textContent =
    [meta.store_code, meta.profile, meta.week_ending_pretty ? ('Week ending '+meta.week_ending_pretty) : ''].filter(Boolean).join(' · ');
  document.getElementById('client').innerHTML =
    '<option value="">All clients ('+ALL.length+')</option>' +
    CLIENTS.map(function(c){ return '<option value="'+esc(c)+'">'+esc(c)+'</option>'; }).join('');
  document.getElementById('footer').textContent =
    [ activeCount()+' active', ALL.length+' total', meta.generated?('generated '+meta.generated):'' ].filter(Boolean).join(' · ');

  // ---- Icons ----
  var ICO_CHEV='<svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"></path></svg>';
  var ICO_ALERT='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"></path></svg>';
  function barcodeBit(r){
    if(!r.barcode) return '';
    return '<span class="bc"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M4 5v14M7.5 5v14M11 5v14M14 5v14M17.5 5v14M20 5v14"></path></svg>'+esc(r.barcode)+'</span>';
  }

  // ---- Cards ----
  function renderCards(){
    var html = CATS.map(function(c){
      var n=outstanding(c.key), cls=(n>0?'red':'green'), sel=(state.view===c.key?' sel':'');
      return '<button type="button" class="card '+cls+sel+'" data-view="'+c.key+'">'+
        (n===0?'<span class="tick">✓</span>':'')+
        '<div class="v">'+n+'</div><div class="l">'+esc(c.label)+'</div></button>';
    }).join('');
    html += '<button type="button" class="card neutral'+(state.view==='all'?' sel':'')+'" data-view="all">'+
      '<div class="v">'+viewAll.length+'</div><div class="l">All products</div></button>';
    document.getElementById('cards').innerHTML = html;
  }

  // ---- Rows ----
  function cell(l,v){ return '<div><div class="lbl">'+esc(l)+'</div><div class="val">'+v+'</div></div>'; }
  function detailGrid(r){
    var status = (r.status||'') + (sdefs[r.status] ? ' '+sdefs[r.status] : '');
    return '<div class="grid">'+
      cell('SOH', Math.round(num(r.soh))) +
      cell('DROS', num(r.dros).toFixed(2)) +
      cell('Days cover', num(r.dsc).toFixed(1)) +
      cell('Last sold', fmtDate(r.last_sold)+ago(r.days_sold)) +
      cell('Last received', fmtDate(r.last_recv)+ago(r.days_recv)) +
      cell('Last ordered', fmtDate(r.last_ord)+ago(r.days_ord)) +
      cell('Status', esc(status||'—')) +
      cell('Listing', esc(r.listing||'—')) +
      cell('RP type', esc(r.rp||'—')) +
      cell('Supply', esc(r.supply||'—')) +
    '</div>';
  }
  // A genuinely new line: active, has stock, never sold, received within the last 30 days.
  function isNew(r){
    if(String(r.status||'')!=='04' || num(r.soh)<=0) return false;
    var ls = r.last_sold || '';
    var neverSold = (!ls || String(ls).indexOf('1900')===0 || r.days_sold==null);
    return neverSold && (r.days_recv!=null) && (num(r.days_recv) <= 30);
  }
  // In an action list: chips for the item's OTHER lists ("+ Negative SOH").
  // In All products: chips for every list the item is in. "New" indicator where it applies.
  function catBadges(r, currentKey){
    var cs = cats(r), chips = [];
    cs.forEach(function(k){
      if(currentKey && k===currentKey) return;
      chips.push('<span class="badge red">'+(currentKey?'+ ':'')+esc(CAT[k].label)+'</span>');
    });
    if(isNew(r)) chips.push('<span class="badge new">New</span>');
    if(!currentKey && !cs.length && !isNew(r)) chips.push('<span class="badge grey">No action</span>');
    return chips.join('');
  }
  function rowHTML(r, cfg, opts){
    opts = opts || {};
    var id=keyOf(r), isDone=done.has(id), isOpen=(state.open===id);
    var primary=classify(r);
    var ctaText = opts.allView ? (primary?CAT[primary].cta:'') : cfg.cta;
    var badges = catBadges(r, opts.allView ? null : cfg.key);
    var d2 = '<div class="d2">'+
        (r.id?('<span>#'+esc(r.id)+'</span>'):'') + barcodeBit(r) +
        (r.vendor?('<span class="vend">'+esc(r.vendor)+'</span>'):'') + badges +
      '</div>';
    var detail = isOpen ? ('<div class="detail">'+
        (ctaText?('<div class="cta">'+ICO_ALERT+esc(ctaText)+'</div>'):'')+ detailGrid(r) +'</div>') : '';
    return '<div class="row'+(isDone?' done':'')+(isOpen?' open':'')+'" data-id="'+esc(id)+'">'+
      '<div class="top">'+
        '<input type="checkbox" class="chk" data-id="'+esc(id)+'"'+(isDone?' checked':'')+' aria-label="Mark complete">'+
        '<div class="tap" data-id="'+esc(id)+'">'+
          '<div class="desc"><div class="d1">'+esc(r.desc||'(no description)')+'</div>'+d2+'</div>'+
          '<div class="metric"><span class="mv" style="color:'+(cfg.key==='all'?'var(--ink)':'var(--red-deep)')+'">'+cfg.metric(r)+'</span> <span class="mu">'+esc(cfg.unit)+'</span></div>'+
          ICO_CHEV+
        '</div>'+
      '</div>'+ detail +
    '</div>';
  }

  function filterRows(rows){
    if(!state.q) return rows.slice();
    var q=state.q.toLowerCase();
    return rows.filter(function(r){
      return (r.desc||'').toLowerCase().indexOf(q)>=0 ||
             (r.barcode||'').toLowerCase().indexOf(q)>=0 ||
             String(r.id||'').toLowerCase().indexOf(q)>=0 ||
             (r.vendor||'').toLowerCase().indexOf(q)>=0;
    });
  }
  function sortRows(rows,cfg){
    rows.sort(state.sort==='az'
      ? function(a,b){ var x=(a.desc||'').toLowerCase(), y=(b.desc||'').toLowerCase(); return x<y?-1:(x>y?1:0); }
      : cfg.cmp);
    return rows;
  }

  function renderList(){
    var list=document.getElementById('list');
    var headEl=document.getElementById('metricLabel'), cntEl=document.getElementById('countLabel');

    if(state.view==='all'){
      var rows=sortRows(filterRows(viewAll),ALLCFG);
      headEl.textContent=ALLCFG.head;
      cntEl.textContent=rows.length+' product'+(rows.length===1?'':'s');
      list.innerHTML = rows.length ? rows.map(function(r){return rowHTML(r,ALLCFG,{allView:true});}).join('')
        : '<div class="empty"><div class="big">No products</div>No items for this client.</div>';
      return;
    }

    var cfg=CAT[state.view], all=buckets[state.view]||[];
    var active=filterRows(all.filter(function(r){return !done.has(keyOf(r));}));
    var comp  =filterRows(all.filter(function(r){return  done.has(keyOf(r));}));
    sortRows(active,cfg); sortRows(comp,cfg);

    headEl.textContent=cfg.head;
    cntEl.textContent = state.q ? (active.length+comp.length)+' match'+((active.length+comp.length)===1?'':'es')
                                : active.length+' to action';

    var html='';
    if(!active.length && !comp.length){
      html = '<div class="empty"><div class="big">All clear</div>'+(state.q?'No items match your search.':'Nothing to action in this list.')+'</div>';
    } else {
      html += active.length ? active.map(function(r){return rowHTML(r,cfg,{});}).join('')
        : '<div class="empty"><div class="big">All clear ✓</div>'+(state.q?'No open items match.':'Everything here is ticked off.')+'</div>';
      if(comp.length){
        var co=!!state.compOpen[state.view];
        html += '<div class="compsec"><div class="comphead" data-comp="'+state.view+'">'+
          '<span>Completed ('+comp.length+')</span><span class="lk">'+(co?'Hide ▲':'Show ▼')+'</span></div>'+
          (co ? comp.map(function(r){return rowHTML(r,cfg,{});}).join('') : '')+
        '</div>';
      }
    }
    list.innerHTML=html;
  }

  function refresh(){ rebuild(); renderCards(); renderList(); }

  // ---- Glossary ----
  function renderGlossary(){
    var items=[
      {t:'Out of stock', c:'var(--red)', d:'Active line (status 04) with on-hand at or below 0 — shelf is empty, raise an order. Ranked by lost sales per day. A negative on-hand also shows under Negative SOH.'},
      {t:'Low Stock Cover', c:'var(--red)', d:'Active line with days cover &le; 14 and still selling (DROS &gt; 0) — about to run out, reorder. An out-of-stock line that&rsquo;s still selling appears here and under Out of stock.'},
      {t:'Phantom', c:'var(--red)', d:'Active line with on-hand &gt; 0 but no sale in 60+ days (1900 dates ignored). The system shows stock that may not be on the shelf — verify with a physical count.'},
      {t:'Negative SOH', c:'var(--red)', d:'On-hand below 0 on any status — an impossible figure. A rep counts the shelf to correct the system. Takes priority over Out of stock.'},
      {t:'Discontinued with SOH', c:'var(--red)', d:'Non-active line (status 72, 07, 71, 70, 06, 60, 61, 08) still holding stock — clear or return it.'},
      {t:'New', c:'var(--blue)', d:'Active line with stock, received in the last 30 days and not yet sold — a new line to get onto the shelf and selling. An indicator, not an action list.'}
    ];
    var html='<p class="gnote">An article can appear in <b>more than one</b> list when it matches several rules — its chips show the others (e.g. <b>+ Negative SOH</b>). Tick it off in any list and it&rsquo;s ticked off everywhere. A card turns <b style="color:var(--green)">green</b> once every item in its list is ticked off.</p>';
    html += items.map(function(g){
      return '<div class="gitem"><div class="gt"><span class="gdot" style="background:'+g.c+'"></span>'+g.t+'</div><div class="gd">'+g.d+'</div></div>';
    }).join('');
    html += '<div class="gitem"><div class="gt">Tick boxes</div><div class="gd">Tick an item to mark it done — it drops into the <b>Completed</b> list at the bottom of that tab. Untick it there to send it back. Your ticks are saved on this phone for this report.</div></div>';
    document.getElementById('glossaryBody').innerHTML=html;
  }

  // ---- Events ----
  document.getElementById('cards').addEventListener('click', function(e){
    var b=e.target.closest('.card'); if(!b) return;
    state.view=b.getAttribute('data-view'); state.open=null; renderCards(); renderList();
  });
  document.getElementById('client').addEventListener('change', function(e){
    state.client=e.target.value; state.open=null; refresh();
  });
  document.getElementById('search').addEventListener('input', function(e){
    state.q=e.target.value.trim(); state.open=null; renderList();
  });
  document.getElementById('sortBtn').addEventListener('click', function(){
    state.sort=(state.sort==='urgent'?'az':'urgent');
    document.getElementById('sortLabel').textContent=(state.sort==='az'?'A–Z':'Most urgent');
    state.open=null; renderList();
  });
  document.getElementById('list').addEventListener('click', function(e){
    if(e.target.closest('.chk')) return;
    var comp=e.target.closest('.comphead');
    if(comp){ var k=comp.getAttribute('data-comp'); state.compOpen[k]=!state.compOpen[k]; renderList(); return; }
    var tap=e.target.closest('.tap'); if(!tap) return;
    var id=tap.getAttribute('data-id'); state.open=(state.open===id?null:id); renderList();
  });
  document.getElementById('list').addEventListener('change', function(e){
    var c=e.target.closest('.chk'); if(!c) return;
    var id=c.getAttribute('data-id');
    function commit(){ done.add(id); persist(); renderCards(); renderList(); }
    // Untick (from Completed) stays instant.
    if(!c.checked){ done.delete(id); persist(); renderCards(); renderList(); return; }
    var row=c.closest('.row');
    if(!row){ commit(); return; }
    if(row.classList.contains('busy')) return;
    // Animate, THEN commit: tick pops + row flashes green + strikes through, then collapses into Completed.
    row.classList.add('busy','ticking');
    setTimeout(function(){
      row.style.maxHeight = row.scrollHeight + 'px';  // pin current height so max-height can transition to 0
      void row.offsetHeight;                          // force reflow
      row.classList.add('collapsing');
      row.style.maxHeight = '0px';
      var fired=false; function fin(){ if(fired) return; fired=true; commit(); }
      row.addEventListener('transitionend', function(ev){ if(ev.propertyName==='max-height') fin(); });
      setTimeout(fin, 480);                            // fallback if transitionend doesn't fire
    }, 300);
  });
  document.getElementById('glossaryBtn').addEventListener('click', function(){ document.getElementById('glossary').hidden=false; });
  document.getElementById('glossaryClose').addEventListener('click', function(){ document.getElementById('glossary').hidden=true; });
  document.getElementById('glossary').addEventListener('click', function(e){ if(e.target.id==='glossary') e.target.hidden=true; });

  renderGlossary();
  refresh();
})();
</script>
