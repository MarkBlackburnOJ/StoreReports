<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#16539F">
<title>Account Manager — Daily Report</title>
<style>
  :root{
    --blue:#16539F; --blue-deep:#0E3D75; --blue-tint:#E4ECF7;
    --red:#E31E24; --red-deep:#C2161B; --red-text:#A32D2D; --red-tint:#FCEBEB;
    --amber:#854F0B; --amber-tint:#FAEEDA;
    --phantom:#9E1B1F; --phantom-tint:#F7E3E3;
    --green:#1E8E3E; --green-text:#1B6E33; --green-tint:#E6F4EA;
    --ink:#1F2024; --mute:#6B7480; --mute-2:#8A929D;
    --paper:#F4F6F8; --card:#FFFFFF; --line:#E3E7EC; --line-soft:#ECEEF1; --shell:#EAECEF;
  }
  *{box-sizing:border-box;-webkit-text-size-adjust:100%;}
  html,body{margin:0;padding:0;}
  body{background:var(--shell);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.45;}
  .wrap{max-width:1180px;margin:0 auto;background:var(--paper);min-height:100vh;box-shadow:0 0 30px rgba(0,0,0,.05);}

  header{background:var(--blue);color:#fff;padding:22px 28px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;}
  header .eyebrow{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.65);}
  header h1{font-size:24px;font-weight:700;margin:5px 0 0;letter-spacing:-.01em;}
  header .meta{font-size:12.5px;color:rgba(255,255,255,.8);margin-top:5px;}
  .ibtn{border:0;background:rgba(255,255,255,.16);color:#fff;height:38px;padding:0 14px;border-radius:10px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;}

  .tabs{display:flex;gap:4px;padding:0 18px;background:var(--blue-deep);overflow-x:auto;}
  .tab{border:0;background:none;color:rgba(255,255,255,.75);font-family:inherit;font-size:13.5px;font-weight:600;
    padding:12px 16px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
  .tab.active{color:#fff;border-bottom-color:#fff;}

  .pane{padding:20px 24px 36px;display:none;}
  .pane.active{display:block;}
  .h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--mute);margin:26px 0 10px;}
  .h2:first-child{margin-top:6px;}

  /* stat cards */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
  .stat{background:var(--card);border:.5px solid var(--line);border-radius:12px;padding:14px 16px;}
  .stat .v{font-size:27px;font-weight:700;line-height:1;letter-spacing:-.01em;}
  .stat .l{font-size:12px;color:var(--mute);margin-top:6px;}
  .stat .s{font-size:11.5px;color:var(--mute-2);margin-top:3px;}
  .stat.accent{border-left:4px solid var(--red);} .stat.accent .v{color:var(--red-deep);}
  .stat.warn{border-left:4px solid var(--amber);}
  .stat.phan{border-left:4px solid var(--phantom);}
  .stat.blue{border-left:4px solid var(--blue);}
  .stat.ok{border-left:4px solid var(--green);}

  .cols{display:grid;grid-template-columns:1fr 1fr;gap:22px;}
  @media(max-width:760px){ .cols{grid-template-columns:1fr;} header h1{font-size:20px;} .pane{padding:16px 12px 30px;} }

  /* mini rank list */
  .rank{background:var(--card);border:.5px solid var(--line);border-radius:12px;overflow:hidden;}
  .rank .ri{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:.5px solid var(--line-soft);}
  .rank .ri:first-child{border-top:0;}
  .rank .nm{flex:1;min-width:0;font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rank .nm small{display:block;font-weight:400;color:var(--mute-2);font-size:11px;}
  .rank .bar{height:7px;border-radius:4px;background:var(--red);opacity:.85;}
  .rank .barwrap{flex:0 0 84px;background:var(--line-soft);border-radius:4px;overflow:hidden;}
  .rank .mv{flex:0 0 64px;text-align:right;font-weight:700;font-size:13px;}
  .rank .mv small{font-weight:400;color:var(--mute-2);font-size:10.5px;}

  /* tables */
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:4px 0 12px;}
  .search{display:flex;align-items:center;gap:7px;background:var(--card);border:.5px solid var(--line);border-radius:9px;padding:0 11px;height:38px;flex:1;min-width:180px;}
  .search input{border:0;outline:0;background:none;flex:1;font-family:inherit;font-size:13.5px;color:var(--ink);min-width:0;}
  select.f{height:38px;border:.5px solid var(--line);border-radius:9px;background:var(--card);font-family:inherit;font-size:13px;color:var(--ink);padding:0 10px;}
  .count{font-size:12px;color:var(--mute-2);}
  .tbl-scroll{overflow-x:auto;background:var(--card);border:.5px solid var(--line);border-radius:12px;}
  table{border-collapse:collapse;width:100%;font-size:13px;}
  thead th{position:sticky;top:0;background:#F0F2F5;text-align:right;padding:10px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--mute);cursor:pointer;white-space:nowrap;border-bottom:1px solid var(--line);}
  thead th.l{text-align:left;}
  thead th.sorted::after{content:" \25BE";color:var(--blue);}
  thead th.asc::after{content:" \25B4";color:var(--blue);}
  tbody td{padding:9px 12px;text-align:right;border-top:.5px solid var(--line-soft);white-space:nowrap;}
  tbody td.l{text-align:left;}
  tbody tr:hover{background:#F7FAFF;}
  .code{font-weight:700;color:var(--blue-deep);}
  .nm2{color:var(--mute);}
  .chip{display:inline-block;min-width:30px;padding:2px 7px;border-radius:6px;font-weight:700;font-size:12px;}
  .chip.r{background:var(--red-tint);color:var(--red-text);} .chip.z{color:var(--mute-2);font-weight:400;}
  .pill{display:inline-block;font-size:11px;padding:1px 8px;border-radius:999px;background:#EEF0F3;color:var(--mute);}

  footer{padding:18px 24px 30px;text-align:center;font-size:11.5px;color:var(--mute-2);}

  .overlay{position:fixed;inset:0;background:rgba(20,25,33,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .overlay[hidden]{display:none;}
  .sheet{background:var(--paper);max-width:560px;width:100%;max-height:86vh;border-radius:14px;display:flex;flex-direction:column;}
  .sheet h3{margin:0;padding:16px 20px;border-bottom:.5px solid var(--line);font-size:15px;}
  .sheetbody{overflow:auto;padding:6px 20px 22px;}
  .gitem{padding:12px 0;border-bottom:.5px solid var(--line-soft);}
  .gitem b{font-size:13.5px;} .gitem p{margin:4px 0 0;font-size:12.5px;color:var(--mute);line-height:1.5;}
  .iclose{float:right;border:0;background:#EEF0F3;width:28px;height:28px;border-radius:50%;cursor:pointer;color:var(--mute);font-size:15px;}
</style>
</head>

<div class="wrap">
  <header>
    <div>
      <div class="eyebrow">Account Manager &middot; Daily Report</div>

</div>

  </div>
</div>

<script>
(function(){
  var D; try{ D=JSON.parse(document.getElementById('payload').textContent); }
  catch(e){ document.getElementById('overview').innerHTML='<p>Could not load data.</p>'; return; }
  var meta=D.meta||{}, P=D.portfolio||{}, CLIENTS=D.by_client||[], SITES=D.by_site||[], PROFILES=D.by_profile||[], SKUS=D.top_oos_skus||[];

  function n(x){ return (x==null?0:x).toLocaleString('en-ZA'); }
  function n1(x){ return (x==null?0:Math.round(x)).toLocaleString('en-ZA'); }
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  document.getElementById('title').textContent = 'Portfolio stock health';
  document.getElementById('meta').textContent =
    [meta.site_count+' sites', (meta.client_count||CLIENTS.length)+' client accounts',
     meta.week_ending?('Week ending '+meta.week_ending):'', 'Data '+ (meta.data_date||'')].filter(Boolean).join('  ·  ');
  document.getElementById('footer').textContent =
    ['Generated '+(meta.generated||''), n(meta.total_articles)+' article lines', n(meta.active_count)+' active', 'ARIA'].filter(Boolean).join('  ·  ');

  // ---------- Overview ----------
  function stat(v,l,s,cls){ return '<div class="stat '+(cls||'')+'"><div class="v">'+v+'</div><div class="l">'+esc(l)+'</div>'+(s?'<div class="s">'+esc(s)+'</div>':'')+'</div>'; }
  function rankList(items, nameFn, subFn, valFn, unit){
    var max=Math.max.apply(null,items.map(valFn).concat([1]));
    return '<div class="rank">'+items.map(function(it){
      var v=valFn(it); var w=Math.max(3, Math.round(v/max*100));
      return '<div class="ri"><div class="nm">'+esc(nameFn(it))+(subFn?'<small>'+esc(subFn(it))+'</small>':'')+'</div>'+
        '<div class="barwrap"><div class="bar" style="width:'+w+'%"></div></div>'+
        '<div class="mv">'+n1(v)+(unit?' <small>'+unit+'</small>':'')+'</div></div>';
    }).join('')+'</div>';
  }
  var ov=document.getElementById('overview');
  ov.innerHTML =
    '<div class="h2">Portfolio</div>'+
    '<div class="stats">'+
      stat(n(meta.site_count),'Sites','across the portfolio','blue')+
      stat(n(P.to_action),'Items to action','open across all sites','accent')+
      stat(n1(P.lost_daily),'Units/day lost','from out-of-stock lines','accent')+
      stat(n(P.negative),'Negative SOH','data integrity — count needed','warn')+
      stat(n(P.new),'New lines','received <30d, not yet sold','ok')+
    '</div>'+
    '<div class="h2">Action lists across all sites</div>'+
    '<div class="stats">'+
      stat(n(P.oos),'Out of stock', n1(P.lost_daily)+' units/day','accent')+
      stat(n(P.low_cover),'Low cover','running low','warn')+
      stat(n(P.phantom),'Phantom', n(P.phantom_units)+' units to verify','phan')+
      stat(n(P.negative),'Negative SOH','count to correct','warn')+
      stat(n(P.discontinued),'Discontinued','stock to clear','blue')+
    '</div>'+
    '<div class="cols">'+
      '<div><div class="h2">Biggest sales loss &mdash; by client</div>'+
        rankList(CLIENTS.slice(0,8), function(c){return c.client;}, function(c){return c.sites+' sites · '+n(c.oos)+' OOS';}, function(c){return c.lost_daily;}, 'u/day')+'</div>'+
      '<div><div class="h2">Stores needing attention &mdash; by items to action</div>'+
        rankList(SITES.slice(0,8), function(s){return s.code+'  '+s.name;}, function(s){return s.profile+' · '+n(s.oos)+' OOS · '+n(s.negative)+' neg';}, function(s){return s.to_action;}, '')+'</div>'+
    '</div>'+
    '<div class="h2">By store profile</div>'+
    '<div class="stats">'+ PROFILES.map(function(p){
        return stat(n(p.to_action), p.profile, (p.sites||0)+' sites · '+n(p.oos)+' OOS','');
      }).join('') +'</div>';

  // ---------- generic sortable table ----------
  function chip(v){ return v>0 ? '<span class="chip r">'+n(v)+'</span>' : '<span class="chip z">0</span>'; }
  function buildTable(paneId, cols, rows, opts){
    opts=opts||{};
    var state={sort:opts.sort, asc:false, q:'', filter:''};
    var pane=document.getElementById(paneId);
    var tools='';
    if(opts.search||opts.filterKey){
      tools='<div class="toolbar">';
      if(opts.search) tools+='<label class="search"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8A929D" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path></svg><input type="search" placeholder="'+esc(opts.search)+'"></label>';
      if(opts.filterKey){
        var vals=Array.from(new Set(rows.map(function(r){return r[opts.filterKey];}))).filter(Boolean).sort();
        tools+='<select class="f"><option value="">All '+esc(opts.filterLabel||opts.filterKey)+'</option>'+vals.map(function(v){return '<option>'+esc(v)+'</option>';}).join('')+'</select>';
      }
      tools+='<span class="count"></span></div>';
    }
    pane.innerHTML=tools+'<div class="tbl-scroll"><table><thead><tr>'+
      cols.map(function(c){return '<th class="'+(c.l?'l':'')+'" data-k="'+c.key+'">'+esc(c.label)+'</th>';}).join('')+
      '</tr></thead><tbody></tbody></table></div>';
    var tbody=pane.querySelector('tbody'), thead=pane.querySelector('thead'), cnt=pane.querySelector('.count');
    var searchEl=pane.querySelector('.search input'), filterEl=pane.querySelector('select.f');
    function render(){
      var rs=rows.filter(function(r){
        if(state.filter && r[opts.filterKey]!==state.filter) return false;
        if(state.q){ var q=state.q.toLowerCase(); return (opts.searchKeys||[]).some(function(k){return String(r[k]||'').toLowerCase().indexOf(q)>=0;}); }
        return true;
      });
      if(state.sort){ rs=rs.slice().sort(function(a,b){
        var x=a[state.sort],y=b[state.sort];
        if(typeof x==='string'){ x=x.toLowerCase(); y=String(y||'').toLowerCase(); return state.asc?(x<y?-1:x>y?1:0):(x>y?-1:x<y?1:0); }
        return state.asc?(x-y):(y-x);
      }); }
      tbody.innerHTML=rs.map(function(r){
        return '<tr>'+cols.map(function(c){
          if(c.render) return '<td class="'+(c.l?'l':'')+'">'+c.render(r)+'</td>';
          var v=r[c.key];
          if(c.chip) return '<td>'+chip(v)+'</td>';
          return '<td class="'+(c.l?'l':'')+'">'+(c.fmt?c.fmt(v):esc(v))+'</td>';
        }).join('')+'</tr>';
      }).join('');
      if(cnt) cnt.textContent=rs.length+' rows';
      thead.querySelectorAll('th').forEach(function(th){ th.className=(th.getAttribute('data-k')===cols[0].key&&cols[0].l?'l':th.classList.contains('l')?'l':''); th.classList.remove('sorted','asc');
        if(th.getAttribute('data-k')===state.sort) th.classList.add(state.asc?'asc':'sorted'); });
    }
    thead.addEventListener('click',function(e){ var th=e.target.closest('th'); if(!th)return; var k=th.getAttribute('data-k');
      if(state.sort===k) state.asc=!state.asc; else {state.sort=k; state.asc=false;} render(); });
    if(searchEl) searchEl.addEventListener('input',function(e){ state.q=e.target.value.trim(); render(); });
    if(filterEl) filterEl.addEventListener('change',function(e){ state.filter=e.target.value; render(); });
    render();
  }

  // Clients
  buildTable('clients',[
    {key:'client',label:'Client account',l:true,render:function(r){return '<span class="code">'+esc(r.client)+'</span>';}},
    {key:'sites',label:'Sites',fmt:n},{key:'articles',label:'Lines',fmt:n},
    {key:'oos',label:'OOS',chip:true},{key:'low_cover',label:'Low',chip:true},
    {key:'phantom',label:'Phantom',chip:true},{key:'negative',label:'Neg',chip:true},
    {key:'discontinued',label:'Disc',chip:true},
    {key:'lost_daily',label:'Units/day lost',fmt:n1}
  ],CLIENTS,{sort:'lost_daily'});

  // Sites
  buildTable('sites',[
    {key:'code',label:'Site',l:true,render:function(r){return '<span class="code">'+esc(r.code)+'</span> <span class="nm2">'+esc(r.name)+'</span>';}},
    {key:'profile',label:'Profile',l:true,render:function(r){return '<span class="pill">'+esc(r.profile)+'</span>';}},
    {key:'to_action',label:'To action',fmt:n},
    {key:'oos',label:'OOS',chip:true},{key:'low_cover',label:'Low',chip:true},
    {key:'phantom',label:'Phantom',chip:true},{key:'negative',label:'Neg',chip:true},
    {key:'discontinued',label:'Disc',chip:true},{key:'lost_daily',label:'Units/day',fmt:n1}
  ],SITES,{sort:'to_action',search:'Search site code or name',searchKeys:['code','name'],filterKey:'profile',filterLabel:'profiles'});

  // Top SKUs
  buildTable('skus',[
    {key:'article',label:'Article',l:true,render:function(r){return '<span class="code">'+esc(r.article||'—')+'</span>';}},
    {key:'desc',label:'Description',l:true,fmt:esc},
    {key:'sites_oos',label:'Sites out of stock',fmt:n},
    {key:'lost_daily',label:'Units/day lost',fmt:n1}
  ],SKUS,{sort:'sites_oos'});

  // Tabs
  document.getElementById('tabs').addEventListener('click',function(e){
    var t=e.target.closest('.tab'); if(!t)return;
    document.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('active',x===t);});
    document.querySelectorAll('.pane').forEach(function(p){p.classList.toggle('active',p.id===t.getAttribute('data-pane'));});
  });

  // Glossary
  document.getElementById('glossaryBody').innerHTML=[
    ['Out of stock','Active line (status 04) with on-hand at or below 0 — shelf is empty. Portfolio "units/day lost" sums the daily rate of sale across all out-of-stock lines.'],
    ['Low cover','Active line, days cover &le; 14 and still selling — about to run out.'],
    ['Phantom','Active line with stock but no sale in 60+ days — likely not on the shelf; needs a physical count.'],
    ['Negative SOH','On-hand below 0 (any status) — impossible figure; a rep counts the shelf to correct the system. The data-integrity signal for field managers.'],
    ['Discontinued','Non-active line still holding stock — clear or return it.'],
    ['New','Active line with stock, received in the last 30 days, not yet sold.'],
    ['Items to action','Distinct article lines that fall into at least one action list (an article can be in more than one).']
  ].map(function(g){return '<div class="gitem"><b>'+g[0]+'</b><p>'+g[1]+'</p></div>';}).join('');
  document.getElementById('glossaryBtn').addEventListener('click',function(){document.getElementById('glossary').hidden=false;});
  document.getElementById('glossaryClose').addEventListener('click',function(){document.getElementById('glossary').hidden=true;});
  document.getElementById('glossary').addEventListener('click',function(e){if(e.target.id==='glossary')e.target.hidden=true;});
})();
</script>
</body>
</html>
