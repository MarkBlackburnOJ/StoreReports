<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#16539F">
<title>Account Manager — Daily Report</title>
<style>
  :root{
    --blue:#16539F; --blue-deep:#0E3D75; --blue-tint:#E4ECF7;
    --red:#E31E24; --red-deep:#C2161B; --red-text:#A32D2D; --red-tint:#FCEBEB;
    --amber:#C98A1A; --amber-deep:#8A5A07; --amber-tint:#FBF1DC;
    --green:#1E8E3E; --green-deep:#157233; --green-text:#1B6E33; --green-tint:#E6F4EA;
    --ink:#1F2024; --mute:#6B7480; --mute-2:#8A929D;
    --paper:#F4F6F8; --card:#FFFFFF; --line:#E3E7EC; --line-soft:#ECEEF1; --shell:#EAECEF;
  }
  *{box-sizing:border-box;-webkit-text-size-adjust:100%;}
  html,body{margin:0;padding:0;}
  body{background:var(--shell);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.45;}
  .wrap{max-width:1180px;margin:0 auto;background:var(--paper);min-height:100vh;box-shadow:0 0 30px rgba(0,0,0,.05);}

  header{background:var(--blue);color:#fff;padding:22px 28px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;}
  header .eyebrow{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.65);}
  header h1{font-size:24px;font-weight:700;margin:5px 0 0;letter-spacing:-.01em;}
  header .meta{font-size:12.5px;color:rgba(255,255,255,.8);margin-top:5px;}
  .ibtn{border:0;background:rgba(255,255,255,.16);color:#fff;height:38px;padding:0 14px;border-radius:10px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;}

  .tabs{display:flex;gap:4px;padding:0 18px;background:var(--blue-deep);overflow-x:auto;}
  .tab{border:0;background:none;color:rgba(255,255,255,.75);font-family:inherit;font-size:13.5px;font-weight:600;padding:12px 16px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
  .tab.active{color:#fff;border-bottom-color:#fff;}

  .pane{padding:20px 24px 36px;display:none;}
  .pane.active{display:block;}
  .h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--mute);margin:24px 0 10px;}
  .h2:first-child{margin-top:4px;}
  .legend{font-size:11.5px;color:var(--mute-2);font-weight:400;text-transform:none;letter-spacing:0;margin-left:8px;}

  /* context KPI cards */
  .kcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:12px;}
  .kcard{border:.5px solid var(--line);border-left-width:4px;border-left-style:solid;border-radius:12px;padding:14px 16px;background:var(--card);}
  .kcard .kl{font-size:12px;color:var(--mute);font-weight:600;}
  .kcard .kv{font-size:30px;font-weight:700;line-height:1;margin:6px 0 10px;letter-spacing:-.01em;}
  .kcard.green{border-left-color:var(--green);background:var(--green-tint);} .kcard.green .kv{color:var(--green-deep);}
  .kcard.amber{border-left-color:var(--amber);background:var(--amber-tint);} .kcard.amber .kv{color:var(--amber-deep);}
  .kcard.red{border-left-color:var(--red);background:var(--red-tint);} .kcard.red .kv{color:var(--red-deep);}
  .dl{display:flex;justify-content:space-between;font-size:11.5px;padding:2px 0;}
  .dl .dk{color:var(--mute);}
  .dn{font-weight:700;white-space:nowrap;} .dn.good{color:var(--green-text);} .dn.bad{color:var(--red-text);} .dn.flat{color:var(--mute-2);font-weight:400;}

  .ctxline{margin:12px 0 2px;font-size:13px;color:var(--ink);background:var(--card);border:.5px solid var(--line);border-radius:10px;padding:12px 15px;line-height:1.8;}
  .ctxline b{font-weight:700;}
  .up{color:var(--red-text);font-weight:700;white-space:nowrap;} .down{color:var(--green-text);font-weight:700;white-space:nowrap;} .flatx{color:var(--mute-2);}

  .cols{display:grid;grid-template-columns:1fr 1fr;gap:22px;}
  @media(max-width:760px){ .cols{grid-template-columns:1fr;} header h1{font-size:20px;} .pane{padding:16px 12px 30px;} }

  .rank{background:var(--card);border:.5px solid var(--line);border-radius:12px;overflow:hidden;}
  .rank .ri{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:.5px solid var(--line-soft);}
  .rank .ri:first-child{border-top:0;}
  .rank .nm{flex:1;min-width:0;font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rank .nm small{display:block;font-weight:400;color:var(--mute-2);font-size:11px;}
  .rank .mv{flex:0 0 auto;text-align:right;font-weight:700;font-size:13px;}
  .rank .mv small{font-weight:400;font-size:10.5px;margin-left:6px;}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:4px 0 12px;}
  .search{display:flex;align-items:center;gap:7px;background:var(--card);border:.5px solid var(--line);border-radius:9px;padding:0 11px;height:38px;flex:1;min-width:180px;}
  .search input{border:0;outline:0;background:none;flex:1;font-family:inherit;font-size:13.5px;color:var(--ink);min-width:0;}
  select.f{height:38px;border:.5px solid var(--line);border-radius:9px;background:var(--card);font-family:inherit;font-size:13px;color:var(--ink);padding:0 10px;}
  .count{font-size:12px;color:var(--mute-2);}
  .tbl-scroll{overflow-x:auto;background:var(--card);border:.5px solid var(--line);border-radius:12px;}
  table{border-collapse:collapse;width:100%;font-size:13px;}
  thead th{position:sticky;top:0;background:#F0F2F5;text-align:right;padding:10px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--mute);cursor:pointer;white-space:nowrap;border-bottom:1px solid var(--line);}
  thead th.l{text-align:left;}
  thead th.sorted::after{content:" \25BE";color:var(--blue);}
  thead th.asc::after{content:" \25B4";color:var(--blue);}
  tbody td{padding:9px 12px;text-align:right;border-top:.5px solid var(--line-soft);white-space:nowrap;}
  tbody td.l{text-align:left;}
  tbody tr:hover{background:#F7FAFF;}
  .code{font-weight:700;color:var(--blue-deep);}
  .nm2{color:var(--mute);}
  .chip{display:inline-block;min-width:30px;padding:2px 7px;border-radius:6px;font-weight:700;font-size:12px;}
  .chip.r{background:var(--red-tint);color:var(--red-text);} .chip.z{color:var(--mute-2);font-weight:400;}
  .pill{display:inline-block;font-size:11px;padding:1px 8px;border-radius:999px;background:#EEF0F3;color:var(--mute);}

  footer{padding:18px 24px 30px;text-align:center;font-size:11.5px;color:var(--mute-2);}

  .overlay{position:fixed;inset:0;background:rgba(20,25,33,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .overlay[hidden]{display:none;}
  .sheet{background:var(--paper);max-width:560px;width:100%;max-height:86vh;border-radius:14px;display:flex;flex-direction:column;}
  .sheet h3{margin:0;padding:16px 20px;border-bottom:.5px solid var(--line);font-size:15px;}
  .sheetbody{overflow:auto;padding:6px 20px 22px;}
  .gitem{padding:12px 0;border-bottom:.5px solid var(--line-soft);}
  .gitem b{font-size:13.5px;} .gitem p{margin:4px 0 0;font-size:12.5px;color:var(--mute);line-height:1.5;}
  .iclose{float:right;border:0;background:#EEF0F3;width:28px;height:28px;border-radius:50%;cursor:pointer;color:var(--mute);font-size:15px;}
</style>
</head>

  <footer id="footer">—</footer>
</div>

</div>

<script>
(function(){
  var D; try{ D=JSON.parse(document.getElementById('payload').textContent); }
  catch(e){ document.getElementById('overview').innerHTML='<p>Could not load data.</p>'; return; }
  var meta=D.meta||{}, P=D.portfolio||{cur:{},prev:{},wk:{}}, CLIENTS=D.clients||[], SITES=D.sites||[];

  function nf(x){ return (x==null?0:x).toLocaleString('en-ZA'); }
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function prettyDate(iso){ if(!iso) return '—'; var p=String(iso).split('-'); if(p.length!==3) return iso;
    var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return (+p[2])+' '+(mo[(+p[1])-1]||''); }

  document.getElementById('meta').textContent =
    [meta.sites+' sites', meta.clients+' client accounts',
     'Today '+prettyDate(meta.current)+'  vs  '+prettyDate(meta.previous)+'  vs  '+prettyDate(meta.weekago)].join('  ·  ');
  document.getElementById('footer').textContent =
    ['Generated '+(meta.generated||''), nf((P.cur||{}).articles)+' article lines', nf((P.cur||{}).active)+' active', 'lower is better on every KPI', 'ARIA'].join('  ·  ');

  // ---- context helpers (lower = better) ----
  function deltaRow(cur, base, label, dec){
    var d=cur-base, flat=(d===0), better=(d<0);
    var cls=flat?'flat':(better?'good':'bad'), arr=flat?'—':(better?'▼':'▲');
    var v=dec?Math.abs(d).toFixed(1):nf(Math.abs(d));
    return '<div class="dl"><span class="dk">'+label+'</span><span class="dn '+cls+'">'+arr+' '+(flat?'0':v)+'</span></div>';
  }
  function ctxCard(label, key, dec){
    var c=P.cur[key]||0, p=P.prev[key]||0, w=P.wk[key]||0;
    var imp=(c<p?1:0)+(c<w?1:0); var cls=imp===2?'green':(imp===1?'amber':'red');
    var v=dec?(+c).toFixed(0):nf(c);
    return '<div class="kcard '+cls+'"><div class="kl">'+esc(label)+'</div><div class="kv">'+v+'</div>'+
      deltaRow(c,p,'vs yesterday',dec)+deltaRow(c,w,'vs last week',dec)+'</div>';
  }
  function inlineD(cur, base, dec){
    var d=cur-base; if(d===0) return '<span class="flatx">&mdash;</span>';
    var b=(d<0); return '<span class="'+(b?'down':'up')+'">'+(b?'▼':'▲')+(dec?Math.abs(d).toFixed(0):nf(Math.abs(d)))+'</span>';
  }

  // ---- Overview ----
  var ov=document.getElementById('overview');
  var cards = ctxCard('Out of stock','oos')+ctxCard('Low cover','low')+ctxCard('Phantom','phantom')+ctxCard('Negative SOH','neg')+ctxCard('Discontinued','disc');
  var ctx = '<b>'+nf(P.cur.action)+'</b> items to action ('+inlineD(P.cur.action,P.prev.action)+' vs yesterday, '+inlineD(P.cur.action,P.wk.action)+' vs last week) &nbsp;&middot;&nbsp; '+
            '<b>~'+nf(Math.round(P.cur.lost))+'</b> units/day lost ('+inlineD(P.cur.lost,P.prev.lost,true)+' / '+inlineD(P.cur.lost,P.wk.lost,true)+') &nbsp;&middot;&nbsp; '+
            '<b>'+nf(meta.sites)+'</b> sites &nbsp;&middot;&nbsp; <b>'+nf(P.cur.active)+'</b> active lines';

  // rank lists (current to-action / lost, with vs-yesterday delta)
  function flat(e){ var c=e.cur||{},p=e.prev||{},w=e.wk||{};
    return {name:e.name,code:e.code,profile:e.profile,sites:(c.sites||1),
      oos:c.oos||0,low:c.low||0,phantom:c.phantom||0,neg:c.neg||0,disc:c.disc||0,action:c.action||0,lost:c.lost||0,
      dActY:(c.action||0)-(p.action||0), dActW:(c.action||0)-(w.action||0), dLostY:(c.lost||0)-(p.lost||0)}; }
  var clientsF=CLIENTS.map(flat), sitesF=SITES.map(flat);
  function rankRows(items, nameFn, subFn, valKey, dKey, unit){
    return '<div class="rank">'+items.map(function(it){
      return '<div class="ri"><div class="nm">'+esc(nameFn(it))+'<small>'+esc(subFn(it))+'</small></div>'+
        '<div class="mv">'+nf(Math.round(it[valKey]))+(unit?'<small>'+unit+'</small>':'')+' '+inlineD(it[valKey], it[valKey]-it[dKey])+'</div></div>';
    }).join('')+'</div>';
  }
  var topClients = clientsF.slice().sort(function(a,b){return b.lost-a.lost;}).slice(0,8);
  var topSites   = sitesF.slice().sort(function(a,b){return b.action-a.action;}).slice(0,8);

  ov.innerHTML =
    '<div class="h2">Portfolio KPIs <span class="legend">today &middot; vs yesterday &middot; vs last week &nbsp;|&nbsp; <b style="color:var(--green-text)">green</b> improving on both, <b style="color:var(--amber-deep)">amber</b> one, <b style="color:var(--red-text)">red</b> neither</span></div>'+
    '<div class="kcards">'+cards+'</div>'+
    '<div class="ctxline">'+ctx+'</div>'+
    '<div class="cols">'+
      '<div><div class="h2">Biggest sales loss — by client</div>'+
        rankRows(topClients, function(c){return c.name;}, function(c){return c.sites+' sites · '+nf(c.oos)+' OOS';}, 'lost','dLostY','u/day')+'</div>'+
      '<div><div class="h2">Stores needing attention</div>'+
        rankRows(topSites, function(s){return s.code+'  '+s.name;}, function(s){return s.profile+' · '+nf(s.oos)+' OOS · '+nf(s.neg)+' neg';}, 'action','dActY','')+'</div>'+
    '</div>';

  // ---- tables ----
  function chip(v){ return v>0 ? '<span class="chip r">'+nf(v)+'</span>' : '<span class="chip z">0</span>'; }
  function dCell(d){ if(d===0) return '<span class="flatx">—</span>'; var b=(d<0); return '<span class="'+(b?'down':'up')+'">'+(b?'▼':'▲')+nf(Math.abs(d))+'</span>'; }
  function buildTable(paneId, cols, rows, opts){
    opts=opts||{}; var state={sort:opts.sort,asc:false,q:'',filter:''};
    var pane=document.getElementById(paneId), tools='';
    if(opts.search||opts.filterKey){
      tools='<div class="toolbar">';
      if(opts.search) tools+='<label class="search"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8A929D" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path></svg><input type="search" placeholder="'+esc(opts.search)+'"></label>';
      if(opts.filterKey){ var vals=Array.from(new Set(rows.map(function(r){return r[opts.filterKey];}))).filter(Boolean).sort();
        tools+='<select class="f"><option value="">All '+esc(opts.filterLabel||'')+'</option>'+vals.map(function(v){return '<option>'+esc(v)+'</option>';}).join('')+'</select>'; }
      tools+='<span class="count"></span></div>';
    }
    pane.innerHTML=tools+'<div class="tbl-scroll"><table><thead><tr>'+cols.map(function(c){return '<th class="'+(c.l?'l':'')+'" data-k="'+c.key+'">'+esc(c.label)+'</th>';}).join('')+'</tr></thead><tbody></tbody></table></div>';
    var tbody=pane.querySelector('tbody'), thead=pane.querySelector('thead'), cnt=pane.querySelector('.count');
    var se=pane.querySelector('.search input'), fe=pane.querySelector('select.f');
    function render(){
      var rs=rows.filter(function(r){ if(state.filter && r[opts.filterKey]!==state.filter) return false;
        if(state.q){ var q=state.q.toLowerCase(); return (opts.searchKeys||[]).some(function(k){return String(r[k]||'').toLowerCase().indexOf(q)>=0;}); } return true; });
      if(state.sort){ rs=rs.slice().sort(function(a,b){ var x=a[state.sort],y=b[state.sort];
        if(typeof x==='string'){ x=x.toLowerCase(); y=String(y||'').toLowerCase(); return state.asc?(x<y?-1:x>y?1:0):(x>y?-1:x<y?1:0); }
        return state.asc?(x-y):(y-x); }); }
      tbody.innerHTML=rs.map(function(r){ return '<tr>'+cols.map(function(c){
        if(c.render) return '<td class="'+(c.l?'l':'')+'">'+c.render(r)+'</td>';
        var v=r[c.key]; if(c.chip) return '<td>'+chip(v)+'</td>'; if(c.delta) return '<td>'+dCell(v)+'</td>';
        return '<td class="'+(c.l?'l':'')+'">'+(c.fmt?c.fmt(v):esc(v))+'</td>'; }).join('')+'</tr>'; }).join('');
      if(cnt) cnt.textContent=rs.length+' rows';
      thead.querySelectorAll('th').forEach(function(th){ th.classList.remove('sorted','asc'); if(th.getAttribute('data-k')===state.sort) th.classList.add(state.asc?'asc':'sorted'); });
    }
    thead.addEventListener('click',function(e){ var th=e.target.closest('th'); if(!th)return; var k=th.getAttribute('data-k'); if(state.sort===k) state.asc=!state.asc; else {state.sort=k; state.asc=false;} render(); });
    if(se) se.addEventListener('input',function(e){ state.q=e.target.value.trim(); render(); });
    if(fe) fe.addEventListener('change',function(e){ state.filter=e.target.value; render(); });
    render();
  }

  buildTable('clients',[
    {key:'name',label:'Client account',l:true,render:function(r){return '<span class="code">'+esc(r.name)+'</span>';}},
    {key:'sites',label:'Sites',fmt:nf},
    {key:'oos',label:'OOS',chip:true},{key:'low',label:'Low',chip:true},{key:'phantom',label:'Phantom',chip:true},
    {key:'neg',label:'Neg',chip:true},{key:'disc',label:'Disc',chip:true},
    {key:'action',label:'To action',fmt:nf},
    {key:'dActY',label:'vs yest',delta:true},
    {key:'lost',label:'Units/day lost',fmt:function(v){return nf(Math.round(v));}}
  ],clientsF,{sort:'lost'});

  buildTable('sites',[
    {key:'code',label:'Site',l:true,render:function(r){return '<span class="code">'+esc(r.code)+'</span> <span class="nm2">'+esc(r.name)+'</span>';}},
    {key:'profile',label:'Profile',l:true,render:function(r){return '<span class="pill">'+esc(r.profile)+'</span>';}},
    {key:'action',label:'To action',fmt:nf},
    {key:'dActY',label:'vs yest',delta:true},
    {key:'oos',label:'OOS',chip:true},{key:'low',label:'Low',chip:true},{key:'phantom',label:'Phantom',chip:true},
    {key:'neg',label:'Neg',chip:true},{key:'disc',label:'Disc',chip:true},
    {key:'lost',label:'Units/day',fmt:function(v){return nf(Math.round(v));}}
  ],sitesF,{sort:'action',search:'Search site code or name',searchKeys:['code','name'],filterKey:'profile',filterLabel:'profiles'});

  // ---- glossary ----
  document.getElementById('glossaryBody').innerHTML=[
    ['Card colours','Each KPI compares today with yesterday and a week ago. Lower is better. Green = lower than both; amber = lower than one; red = lower than neither.'],
    ['Out of stock','Active line (status 04) with on-hand at or below 0. "Units/day lost" sums the rate of sale across those lines.'],
    ['Low cover','Active line, days cover ≤ 14 and still selling — about to run out.'],
    ['Phantom','Active line with stock but no sale in 60+ days (judged as of the data date) — likely not on the shelf.'],
    ['Negative SOH','On-hand below 0 — impossible figure; a rep counts the shelf to correct the system.'],
    ['Discontinued','Non-active line still holding stock — clear or return it.'],
    ['Items to action','Distinct article lines in at least one action list.'],
    ['Periods','Today = each vendor’s latest date; yesterday = that date − 1; last week = that date − 7. Data updates daily.']
  ].map(function(g){return '<div class="gitem"><b>'+g[0]+'</b><p>'+g[1]+'</p></div>';}).join('');
  document.getElementById('tabs').addEventListener('click',function(e){ var t=e.target.closest('.tab'); if(!t)return;
    document.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('active',x===t);});
    document.querySelectorAll('.pane').forEach(function(p){p.classList.toggle('active',p.id===t.getAttribute('data-pane'));}); });
  document.getElementById('glossaryBtn').addEventListener('click',function(){document.getElementById('glossary').hidden=false;});
  document.getElementById('glossaryClose').addEventListener('click',function(){document.getElementById('glossary').hidden=true;});
  document.getElementById('glossary').addEventListener('click',function(e){if(e.target.id==='glossary')e.target.hidden=true;});
})();
</script>
</body>
</html>
